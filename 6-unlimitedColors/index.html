<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Background Color Changer</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="container">

    <div class="card">

      <h1>Background Color Changer</h1>

      <p>
        Click start to generate random background colors every second.
      </p>

      <div class="buttons">

        <button id="start">
          Start
        </button>

        <button id="stop">
          Stop
        </button>

      </div>

      <div class="status">
        Waiting to start...
      </div>

    </div>

  </main>

  <script src="script.js"></script>

</body>
</html>
